<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Hoops</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .app { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; }
  .subtitle { font-size: 14px; color: #888; margin-top: 4px; margin-bottom: 1.5rem; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid #e8e8e3; }
  .stat-label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 600; }
  .stat-value.green { color: #3B6D11; }
  .stat-value.amber { color: #BA7517; }
  .add-card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e3; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .add-row { display: flex; gap: 8px; }
  .add-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fafafa; color: #1a1a1a; outline: none; }
  .add-row input:focus { border-color: #3B6D11; background: #fff; }
  .add-row button { padding: 10px 18px; background: #3B6D11; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; white-space: nowrap; }
  .add-row button:hover { background: #2d5509; }
  .add-row button:disabled { background: #aaa; cursor: not-allowed; }
  .section-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .player-list { display: flex; flex-direction: column; gap: 8px; }
  .player-card { background: #fff; border: 1px solid #e8e8e3; border-left: 3px solid #3B6D11; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #EAF3DE; color: #3B6D11; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .player-name { font-size: 15px; font-weight: 500; color: #1a1a1a; flex: 1; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; }
  .badge.paid { background: #E6F1FB; color: #185FA5; }
  .badge.unpaid { background: #FAEEDA; color: #BA7517; }
  .btn-sm { font-size: 12px; padding: 5px 11px; border-radius: 7px; border: 1px solid #ddd; background: #fff; color: #444; cursor: pointer; }
  .btn-sm:hover { background: #f5f5f0; }
  .btn-sm.active-paid { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
  .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
  .remove-btn { font-size: 20px; color: #ccc; background: none; border: none; cursor: pointer; padding: 0 2px; line-height: 1; }
  .remove-btn:hover { color: #E24B4A; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: #aaa; font-size: 14px; background: #fff; border-radius: 12px; border: 1px solid #e8e8e3; }
  .divider { height: 1px; background: #e8e8e3; margin: 1.75rem 0; }
  .reset-row { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .reset-row span { font-size: 13px; color: #aaa; }
  .reset-btn { font-size: 13px; padding: 7px 14px; background: #fff; border: 1px solid #ddd; border-radius: 8px; color: #aaa; cursor: pointer; white-space: nowrap; }
  .reset-btn:hover { border-color: #E24B4A; color: #E24B4A; }
  .status-bar { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 1rem; min-height: 18px; }
  .status-bar.error { color: #E24B4A; }
  .status-bar.saving { color: #BA7517; }
  .status-bar.saved { color: #3B6D11; }
  .loading-overlay { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e8e8e3; border-top-color: #3B6D11; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <h1>🏀 Weekly hoops</h1>
  <p class="subtitle" id="week-label">Loading...</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Players in</div>
      <div class="stat-value green" id="stat-total">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Paid ($5)</div>
      <div class="stat-value amber" id="stat-paid">—</div>
    </div>
  </div>

  <div class="add-card">
    <div class="add-row">
      <input type="text" id="name-input" placeholder="Your name — tap to join..." />
      <button id="join-btn" onclick="addPlayer()">I'm in</button>
    </div>
  </div>

  <div class="status-bar" id="status-bar"></div>

  <div class="section-label">Who's playing</div>
  <div class="player-list" id="player-list">
    <div class="loading-overlay"><div class="spinner"></div><br>Loading players...</div>
  </div>

  <div class="divider"></div>
  <div class="reset-row">
    <span>New week? Clears all players.</span>
    <button class="reset-btn" onclick="resetWeek()">Reset for new week</button>
  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  // This app uses a free JSONBin.io bin to store shared data.
  // On first load it creates a bin automatically. The bin ID is saved in
  // localStorage so everyone who uses the same hosted URL shares the same data.
  //
  // To get started: just open the page. On first visit it will create a bin
  // automatically and store the ID for future visits.
  // ─────────────────────────────────────────────────────────────────────────

  const JSONBIN_API = 'https://api.jsonbin.io/v3';
  // Free JSONBin master key — replace with your own from jsonbin.io if desired
  // Sign up free at jsonbin.io to get your own key for privacy
  const MASTER_KEY = '$2a$10$ZpMi.LwECJ8kWy0zM5g.2uqu.rqS199X3mtME410XHPJ50EBGNcEC';

  let binId = localStorage.getItem('hoops_bin_id') || null;
  let players = [];
  let isBusy = false;

  // ── Fallback: purely local if no network / no bin ────────────────────────
  const LOCAL_KEY = 'hoops_players_local';

  function getWeekLabel() {
    const now = new Date();
    const day = now.getDay();
    const diff = now.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(now.setDate(diff));
    return 'Week of ' + monday.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function initials(name) {
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status-bar');
    el.textContent = msg;
    el.className = 'status-bar ' + type;
  }

  function render() {
    document.getElementById('stat-total').textContent = players.length;
    document.getElementById('stat-paid').textContent = players.filter(p => p.paid).length;
    const list = document.getElementById('player-list');
    if (players.length === 0) {
      list.innerHTML = '<div class="empty">No one signed up yet — be the first!</div>';
      return;
    }
    list.innerHTML = players.map((p, i) => `
      <div class="player-card">
        <div class="avatar">${initials(p.name)}</div>
        <div class="player-name">${p.name}</div>
        <span class="badge ${p.paid ? 'paid' : 'unpaid'}">${p.paid ? 'Paid' : 'Owes $5'}</span>
        <button class="btn-sm ${p.paid ? 'active-paid' : ''}" onclick="togglePaid(${i})" ${isBusy ? 'disabled' : ''}>${p.paid ? 'Paid ✓' : 'Mark paid'}</button>
        <button class="remove-btn" onclick="removePlayer(${i})" ${isBusy ? 'disabled' : ''} title="Remove">×</button>
      </div>
    `).join('');
  }

  // ── JSONBin helpers ───────────────────────────────────────────────────────
  async function createBin(data) {
    const res = await fetch(`${JSONBIN_API}/b`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Bin-Name': 'weekly-hoops',
        'X-Bin-Private': 'false'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Could not create bin');
    const json = await res.json();
    return json.metadata.id;
  }

  async function readBin(id) {
    const res = await fetch(`${JSONBIN_API}/b/${id}/latest`);
    if (!res.ok) throw new Error('Could not read bin');
    const json = await res.json();
    return json.record;
  }

  async function writeBin(id, data) {
    const res = await fetch(`${JSONBIN_API}/b/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Could not save');
    return true;
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    document.getElementById('week-label').textContent = getWeekLabel();
    try {
      if (!binId) {
        setStatus('Setting up shared list...', 'saving');
        binId = await createBin({ players: [] });
        localStorage.setItem('hoops_bin_id', binId);
      }
      const data = await readBin(binId);
      players = data.players || [];
      setStatus('');
    } catch (e) {
      // Fall back to localStorage if network fails
      players = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]');
      setStatus('Offline mode — changes saved locally only', 'error');
    }
    render();
  }

  async function save() {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(players));
    if (!binId) return;
    try {
      setStatus('Saving...', 'saving');
      await writeBin(binId, { players });
      setStatus('Saved', 'saved');
      setTimeout(() => setStatus(''), 2000);
    } catch (e) {
      setStatus('Saved locally — sync failed', 'error');
    }
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  async function addPlayer() {
    const input = document.getElementById('name-input');
    const name = input.value.trim();
    if (!name || isBusy) return;
    const dupe = players.find(p => p.name.toLowerCase() === name.toLowerCase());
    if (dupe) {
      input.style.borderColor = '#E24B4A';
      setTimeout(() => input.style.borderColor = '', 1200);
      return;
    }
    isBusy = true;
    document.getElementById('join-btn').disabled = true;
    players.push({ name, paid: false });
    render();
    await save();
    isBusy = false;
    document.getElementById('join-btn').disabled = false;
    input.value = '';
    input.focus();
  }

  async function togglePaid(i) {
    if (isBusy) return;
    isBusy = true;
    players[i].paid = !players[i].paid;
    render();
    await save();
    isBusy = false;
    render();
  }

  async function removePlayer(i) {
    if (isBusy) return;
    isBusy = true;
    players.splice(i, 1);
    render();
    await save();
    isBusy = false;
    render();
  }

  async function resetWeek() {
    if (!confirm('Reset for a new week? This will clear all players.')) return;
    isBusy = true;
    players = [];
    render();
    await save();
    isBusy = false;
    render();
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  // Poll for updates every 15 seconds so everyone sees live changes
  setInterval(async () => {
    if (isBusy || !binId) return;
    try {
      const data = await readBin(binId);
      players = data.players || [];
      render();
    } catch (e) {}
  }, 15000);

  init();
</script>
</body>
</html>
